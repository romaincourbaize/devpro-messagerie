services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: p2p-relay:latest

    # ── Ports ──────────────────────────────────────────────────────────────
    ports:
      - "8080:8080"       # WebSocket endpoint  ws://localhost:8080/ws

    # ── Environment ────────────────────────────────────────────────────────
    environment:
      RELAY_ADDR: ":8080"
      RELAY_KEY_FILE: "/data/server.key"
      RELAY_LOG_LEVEL: "info"

    # ── Persistence ────────────────────────────────────────────────────────
    volumes:
      - relay-data:/data

    # ── Healthcheck ────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 32M

  mailer:
    build:
      context: ./mailer
      dockerfile: Dockerfile
    image: p2p-mailer:latest

    environment:
      MAILER_ADDR:      ":8025"
      MAILER_SMTP_HOST: ${MAILER_SMTP_HOST}
      MAILER_SMTP_PORT: ${MAILER_SMTP_PORT:-587}
      MAILER_SMTP_USER: ${MAILER_SMTP_USER}
      MAILER_SMTP_PASS: ${MAILER_SMTP_PASS}
      MAILER_FROM:      ${MAILER_FROM}

    restart: unless-stopped

  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    image: p2p-monitor:latest

    environment:
      MONITOR_TARGET:     "http://server:8080/healthz"
      MONITOR_INTERVAL:   "10"
      MONITOR_TIMEOUT:    "5"
      MONITOR_MAILER_URL: "http://mailer:8025"
      MONITOR_EMAIL_TO:   ${MONITOR_EMAIL_TO}

    restart: unless-stopped

    depends_on:
      - server
      - mailer

# Named volume — survives `docker compose down`, removed only with `docker compose down -v`
volumes:
  relay-data:
